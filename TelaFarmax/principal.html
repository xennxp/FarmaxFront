<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente Farmax</title>
    <link rel="stylesheet" href="styles2.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
<body>
    <div class="container">
        <nav class="nav_lateral">
            <img src="imagens/LogoMini.png" alt="Logotipo Farmax">
           
            <button class="button_nav">
                <span class="material-symbols-outlined">storefront</span>
                Comprar</button>
                
             <button class="button_nav">
                <span class="material-symbols-outlined">settings</span>
                Minha Conta</button>

             <button class="logout">
                <span class="material-symbols-outlined">logout</span>
                Logout</button>
        </nav>

        <main class="tela_meio">
            <header class="barra_inicial">
                <h1>Menu Categorias</h1>
                 <input type="text" class="search-bar" placeholder="Pesquisar remédio, produtos etc...">
            </header>

            <section class="categorias">

                <button class="button_cat">
                    <span class="material-symbols-outlined">editor_choice</span>
                    Top Vendas
                </button>
                
                <button class="button_cat">
                    <span class="material-symbols-outlined">health_and_beauty</span>
                    Medicamentos
                </button>

                <button class="button_cat">
                    <span class="material-symbols-outlined">pill</span>
                    Higiene
                </button>

                <button class="button_cat">
                    <span class="material-symbols-outlined">exercise</span>
                    Suplementos
                </button>

                <button class="button_cat">
                    <span class="material-symbols-outlined">child_care</span>
                    Mamão e Bebê</button>
            </section>
        </main>

        <aside class="carrinho_compras">
            <h2>Meu Carrinho
                <span class="material-symbols-outlined">shopping_cart</span>
            </h2>
            
            <button class="btn_carrinho">Finalizar</button>
        </aside>

    </div>
</body>
</html>
